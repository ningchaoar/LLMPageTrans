<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LLM Translator Config</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h3>LLM Translator</h3>

    <div class="form-group">
      <label for="endpointSelect">Current Endpoint:</label>
      <select id="endpointSelect"></select>
      <div id="endpointDescription" class="helper-text"></div>
    </div>

    <div class="form-group">
      <div id="endpointSummary" class="result-card"></div>
    </div>

    <div class="form-group">
      <label for="estimatedOutputRatio">Estimated Output Ratio:</label>
      <input type="number" id="estimatedOutputRatio" min="0.5" step="0.1" value="1.2">
    </div>

    <div class="toggle-row">
      <span>显示模式</span>
      <label class="switch-label" for="splitViewEnabled">
        <input type="checkbox" id="splitViewEnabled" checked>
        <span>双页面对比</span>
      </label>
    </div>

    <div class="toggle-row">
      <span>大文本分批</span>
      <label class="switch-label" for="enablePromptChunking">
        <input type="checkbox" id="enablePromptChunking">
        <span>超过 4096 词时自动切分</span>
      </label>
    </div>

    <div class="toggle-row">
      <span>页面批次并发</span>
      <label class="switch-label" for="enableBatchConcurrency">
        <input type="checkbox" id="enableBatchConcurrency" checked>
        <span>开启并发翻译（并发数 6）</span>
      </label>
    </div>

    <div class="toggle-row">
      <span>测试调试信息</span>
      <label class="switch-label" for="enableDebugOverlay">
        <input type="checkbox" id="enableDebugOverlay">
        <span>页内显示抽取与批次统计</span>
      </label>
    </div>

    <div class="toggle-row">
      <span>暴力测试模式</span>
      <label class="switch-label" for="enableBrutalTestMode">
        <input type="checkbox" id="enableBrutalTestMode">
        <span>调用模型写日志，页面显示占位字符串</span>
      </label>
    </div>

    <div class="button-row">
      <button id="manageEndpointsBtn" type="button" class="secondary-button">Manage Endpoints</button>
      <button id="saveBtn" type="button">Save Preferences</button>
    </div>
    <button id="estimateBtn" type="button">Estimate Current Page</button>
    <div id="estimateResult" class="result-card" hidden></div>
    <div id="status"></div>

    <hr>
    
    <button id="editGlossaryBtn" style="background-color: #6c757d; margin-bottom: 5px;">Edit Glossary 词库配置</button>
    <button id="translateBtn">Translate Current Page</button>
  </div>
  <script src="provider-config.js"></script>
  <script src="endpoint-storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
