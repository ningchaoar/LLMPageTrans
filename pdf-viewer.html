<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PDF Translator</title>
  <link rel="stylesheet" href="pdf-viewer.css">
</head>
<body>
  <header class="topbar">
    <div class="title-group">
      <h1>PDF Translator</h1>
      <div id="sourceLabel" class="source-label"></div>
    </div>
    <div class="actions">
      <button id="estimateBtn" type="button">Estimate</button>
      <button id="translateBtn" type="button">Translate</button>
    </div>
  </header>

  <main>
    <section id="statusPanel" class="status-panel">
      <div id="statusText">Preparing PDF...</div>
      <div id="progressText" class="muted"></div>
    </section>

    <section id="estimatePanel" class="estimate-panel" hidden></section>
    <section id="emptyPanel" class="empty-panel" hidden></section>
    <section id="pages" class="pages"></section>
  </main>

  <script src="pdf-text-utils.js"></script>
  <script type="module" src="pdf-viewer.js"></script>
</body>
</html>
